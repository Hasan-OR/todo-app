<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      color: #fff;
      padding: 28px 24px 20px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .input-row button {
      padding: 10px 16px;
      background: #818cf8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #6366f1;
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filters button {
      padding: 5px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid #f5f5f5;
      transition: background 0.15s;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      color: #222;
      word-break: break-word;
    }

    .todo-item.completed .text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .edit-btn,
    .todo-item .delete-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .todo-item .edit-btn {
      color: #aaa;
    }

    .todo-item .edit-btn:hover {
      color: #4f46e5;
    }

    .todo-item .delete-btn {
      color: #ccc;
      font-size: 18px;
    }

    .todo-item .delete-btn:hover {
      color: #ef4444;
    }

    .todo-item.editing .text { display: none; }
    .todo-item.editing .edit-btn { display: none; }

    .edit-input {
      flex: 1;
      padding: 4px 10px;
      border: 1px solid #4f46e5;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      display: none;
    }

    .todo-item.editing .edit-input { display: block; }

    .save-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      display: none;
    }

    .todo-item.editing .save-btn { display: block; }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 32px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #888;
    }

    .footer button {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 13px;
      cursor: pointer;
    }

    .footer button:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="Yeni görev ekle..." maxlength="200">
        <button id="add-btn" title="Ekle">+</button>
      </div>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">Tümü</button>
      <button data-filter="active">Bekleyen</button>
      <button data-filter="completed">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="count-label">0 görev kaldı</span>
      <button id="clear-btn">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ioriowfqskouxspnxjqv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlvcmlvd2Zxc2tvdXhzcG54anF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDYyMjksImV4cCI6MjA5MTU4MjIyOX0.iAA3gl55d3i6ZDwo7HEOEqIXfmCoGFqNvB_1C6GexBc';

    const HEADERS = {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    const input      = document.getElementById('todo-input');
    const list       = document.getElementById('todo-list');
    const countLabel = document.getElementById('count-label');

    // ── API helpers ──────────────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: { ...HEADERS, ...(options.headers || {}) }
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

    async function fetchTodos() {
      return apiFetch('todos?order=created_at.asc');
    }

    async function createTodo(text) {
      const rows = await apiFetch('todos', {
        method: 'POST',
        body: JSON.stringify({ text, done: false })
      });
      return rows[0];
    }

    async function updateTodo(id, patch) {
      const rows = await apiFetch(`todos?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify(patch)
      });
      return rows[0];
    }

    async function deleteTodo(id) {
      await apiFetch(`todos?id=eq.${id}`, { method: 'DELETE' });
    }

    async function deleteCompleted() {
      await apiFetch('todos?done=eq.true', { method: 'DELETE' });
    }

    // ── Render ───────────────────────────────────────────────────
    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active')    return !t.done;
        if (filter === 'completed') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty-msg">Görev yok</p>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item ${t.done ? 'completed' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''}>
            <span class="text">${escapeHtml(t.text)}</span>
            <input class="edit-input" type="text" value="${escapeHtml(t.text)}" maxlength="200">
            <button class="edit-btn" title="Düzenle">&#9998;</button>
            <button class="save-btn" title="Kaydet">Kaydet</button>
            <button class="delete-btn" title="Sil">&times;</button>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      countLabel.textContent = `${remaining} görev kaldı`;
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function setLoading(on) {
      document.getElementById('add-btn').disabled = on;
    }

    // ── Actions ──────────────────────────────────────────────────
    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      setLoading(true);
      try {
        const todo = await createTodo(text);
        todos.push(todo);
        render();
      } finally {
        setLoading(false);
      }
    }

    document.getElementById('add-btn').addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    list.addEventListener('change', async e => {
      if (e.target.type !== 'checkbox') return;
      const id = +e.target.closest('.todo-item').dataset.id;
      const done = e.target.checked;
      const updated = await updateTodo(id, { done });
      const idx = todos.findIndex(t => t.id === id);
      if (idx !== -1) todos[idx] = updated;
      render();
    });

    list.addEventListener('click', async e => {
      const item = e.target.closest('.todo-item');
      if (!item) return;
      const id = +item.dataset.id;

      if (e.target.classList.contains('delete-btn')) {
        await deleteTodo(id);
        todos = todos.filter(t => t.id !== id);
        render();
      } else if (e.target.classList.contains('edit-btn')) {
        item.classList.add('editing');
        const editInput = item.querySelector('.edit-input');
        editInput.focus();
        editInput.setSelectionRange(editInput.value.length, editInput.value.length);
      } else if (e.target.classList.contains('save-btn')) {
        const editInput = item.querySelector('.edit-input');
        const newText = editInput.value.trim();
        if (!newText) return;
        const updated = await updateTodo(id, { text: newText });
        const idx = todos.findIndex(t => t.id === id);
        if (idx !== -1) todos[idx] = updated;
        render();
      }
    });

    list.addEventListener('keydown', async e => {
      if (!e.target.classList.contains('edit-input')) return;
      const item = e.target.closest('.todo-item');
      const id = +item.dataset.id;
      if (e.key === 'Enter') {
        const newText = e.target.value.trim();
        if (!newText) return;
        const updated = await updateTodo(id, { text: newText });
        const idx = todos.findIndex(t => t.id === id);
        if (idx !== -1) todos[idx] = updated;
        render();
      } else if (e.key === 'Escape') {
        item.classList.remove('editing');
      }
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.filters button.active').classList.remove('active');
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('clear-btn').addEventListener('click', async () => {
      await deleteCompleted();
      todos = todos.filter(t => !t.done);
      render();
    });

    // ── Init ─────────────────────────────────────────────────────
    (async () => {
      list.innerHTML = '<p class="empty-msg">Yükleniyor...</p>';
      todos = await fetchTodos();
      render();
    })();
  </script>
</body>
</html>
